<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10a37f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #10a37f; --primary-dark: #0d8c6d; --accent: #5436DA; }
        [data-theme="dark"] { --bg1:#0f0f0f; --bg2:#1a1a1a; --bg3:#262626; --bg4:#333; --t1:#fff; --t2:#b4b4b4; --t3:#777; --brd:#2a2a2a; --code:#1e1e1e; --overlay:rgba(0,0,0,0.6); }
        [data-theme="light"] { --bg1:#fff; --bg2:#f7f7f8; --bg3:#ececec; --bg4:#d9d9d9; --t1:#0d0d0d; --t2:#555; --t3:#888; --brd:#e5e5e5; --code:#f6f8fa; --overlay:rgba(0,0,0,0.4); }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg1); color:var(--t1); padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); touch-action:manipulation; }
        button,input,textarea { font-family:inherit; border:none; outline:none; background:none; color:inherit; }
        ::-webkit-scrollbar { display:none; }

        .app { display:flex; flex-direction:column; height:100vh; }
        .header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--bg2); border-bottom:1px solid var(--brd); flex-shrink:0; z-index:10; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-title { font-size:1.1rem; font-weight:600; }
        .icon-btn { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; color:var(--t1); transition:background 0.2s; }
        .icon-btn:active { background:var(--bg3); }
        .profile-pic { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center; color:white; font-weight:600; font-size:0.9rem; overflow:hidden; }
        .profile-pic img { width:100%; height:100%; object-fit:cover; }

        .chat-area { flex:1; overflow-y:auto; padding:16px 16px 160px 16px; -webkit-overflow-scrolling:touch; }
        .chat-wrap { display:flex; flex-direction:column; gap:20px; }

        .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px; }
        .w-logo { width:80px; height:80px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:white; margin-bottom:24px; box-shadow:0 10px 30px rgba(16,163,127,0.3); overflow:hidden; }
        .w-logo img { width:60%; height:60%; object-fit:contain; }
        .welcome h1 { font-size:1.8rem; margin-bottom:8px; }
        .welcome p { color:var(--t2); margin-bottom:32px; }
        .sug-list { display:flex; flex-direction:column; gap:10px; width:100%; }
        .sug-card { background:var(--bg2); border:1px solid var(--brd); border-radius:16px; padding:16px; text-align:left; cursor:pointer; }
        .sug-card:active { transform:scale(0.98); background:var(--bg3); }
        .sug-t { font-weight:600; font-size:0.95rem; margin-bottom:4px; }
        .sug-d { font-size:0.85rem; color:var(--t3); }

        .msg { display:flex; gap:12px; animation:slideUp 0.3s; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; flex-shrink:0; }
        .msg.user .avatar { background:var(--accent); color:white; }
        .msg.assistant .avatar { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; }
        .msg-content { flex:1; min-width:0; }
        .msg-role { font-weight:600; font-size:0.85rem; margin-bottom:4px; color:var(--t2); }
        .msg-bubble { font-size:1rem; line-height:1.6; word-wrap:break-word; overflow-wrap:break-word; }
        .msg.user .msg-bubble { background:var(--bg3); padding:12px 16px; border-radius:18px; display:inline-block; max-width:100%; }
        .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,.msg-bubble h4,.msg-bubble h5,.msg-bubble h6 { margin:16px 0 8px; font-weight:600; line-height:1.3; }
        .msg-bubble h1 { font-size:1.5rem; } .msg-bubble h2 { font-size:1.35rem; } .msg-bubble h3 { font-size:1.2rem; }
        .msg-bubble h4 { font-size:1.1rem; } .msg-bubble h5 { font-size:1rem; } .msg-bubble h6 { font-size:0.95rem; }
        .msg-bubble strong { font-weight:700; } .msg-bubble em { font-style:italic; }
        .msg-bubble a { color:var(--primary); text-decoration:underline; }
        .msg-bubble ul,.msg-bubble ol { margin:10px 0; padding-left:20px; }
        .msg-bubble li { margin-bottom:4px; }
        .msg-bubble blockquote { border-left:3px solid var(--primary); padding-left:12px; margin:12px 0; color:var(--t2); font-style:italic; }
        .msg-bubble pre { background:var(--code); padding:12px; border-radius:8px; overflow-x:auto; margin:10px 0; font-size:0.85rem; }
        .msg-bubble code { background:var(--code); padding:2px 6px; border-radius:4px; font-family:monospace; font-size:0.85em; }
        .msg-bubble pre code { background:none; padding:0; }
        .msg-bubble hr { border:none; border-top:1px solid var(--brd); margin:16px 0; }
        .code-wrap { position:relative; margin:16px 0; border-radius:8px; overflow:hidden; border:1px solid var(--brd); }
        .code-h { display:flex; justify-content:space-between; padding:8px 16px; background:#282c34; border-bottom:1px solid #3e4451; font-size:0.8rem; color:#abb2bf; }
        .copy-btn { cursor:pointer; display:flex; align-items:center; gap:4px; }
        .copy-btn:hover { color:#fff; }
        .code-wrap pre { margin:0; padding:16px; overflow-x:auto; background:var(--code) !important; }
        .code-wrap pre code { font-family:monospace; font-size:0.85rem; line-height:1.5; }
        .msg-actions { display:flex; gap:4px; margin-top:8px; }
        .m-btn { padding:6px 10px; font-size:0.75rem; color:var(--t3); border-radius:8px; cursor:pointer; background:var(--bg2); display:flex; align-items:center; gap:4px; }
        .m-btn:active { background:var(--bg3); }

        .file-attachments { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .file-tag { background:var(--bg3); padding:4px 8px; border-radius:6px; font-size:0.8rem; display:flex; align-items:center; gap:4px; }
        .image-attachments { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .image-attachments img { max-height:200px; max-width:100%; border-radius:8px; border:1px solid var(--brd); cursor:pointer; object-fit:cover; }

        .input-area { position:absolute; bottom:0; left:0; right:0; padding:8px 12px calc(8px + env(safe-area-inset-bottom)); background:var(--bg1); border-top:1px solid var(--brd); z-index:5; }
        .input-box { display:flex; flex-direction:column; background:var(--bg3); border-radius:24px; padding:8px 8px 8px 16px; border:1px solid var(--brd); }
        #user-input { flex:1; resize:none; font-size:1rem; line-height:1.4; max-height:120px; padding:8px 0; background:transparent; width:100%; }
        .input-row { display:flex; align-items:flex-end; gap:8px; width:100%; }
        .input-btn { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
        .input-btn:active { transform:scale(0.9); }
        .voice-btn { color:var(--t2); }
        .voice-btn.recording { background:#ef4444; color:white; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
        .send-btn { background:var(--primary); color:white; }
        .send-btn:disabled { background:var(--bg4); color:var(--t3); }
        .stop-btn { background:#ef4444; color:white; display:none; }
        .stop-btn.active { display:flex; }
        .file-btn { color:var(--t2); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .file-preview { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .file-item { background:var(--bg4); padding:6px 12px; border-radius:8px; font-size:0.85rem; display:flex; align-items:center; gap:6px; }
        .file-item button { cursor:pointer; color:var(--t3); font-size:1rem; line-height:1; background:none; border:none; }
        .file-item button:hover { color:var(--t1); }

        .drawer-overlay { position:fixed; inset:0; background:var(--overlay); opacity:0; visibility:hidden; transition:0.3s; z-index:100; }
        .drawer-overlay.active { opacity:1; visibility:visible; }
        .drawer { position:fixed; top:0; left:0; height:100%; width:80%; max-width:300px; background:var(--bg2); transform:translateX(-100%); transition:transform 0.3s; z-index:101; display:flex; flex-direction:column; padding-top:env(safe-area-inset-top); }
        .drawer.active { transform:translateX(0); }
        .drawer-header { padding:20px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--brd); }
        .drawer-header h2 { font-size:1.2rem; }
        .drawer-list { flex:1; overflow-y:auto; padding:8px; }
        .chat-item { display:flex; align-items:center; padding:14px 12px; border-radius:12px; cursor:pointer; margin-bottom:4px; }
        .chat-item:active, .chat-item.active { background:var(--bg3); }
        .chat-item-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
        .drawer-menu-btn { display:flex; align-items:center; gap:12px; padding:16px; margin:8px 16px; background:var(--bg3); border-radius:12px; font-weight:600; font-size:1rem; cursor:pointer; }
        .drawer-menu-btn:active { background:var(--bg4); }

        .modal-full { position:fixed; inset:0; background:var(--bg1); transform:translateY(100%); transition:transform 0.3s; z-index:200; display:flex; flex-direction:column; padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
        .modal-full.active { transform:translateY(0); }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--brd); flex-shrink:0; }
        .modal-header h2 { font-size:1.2rem; }
        .modal-body { flex:1; overflow-y:auto; padding:20px 16px; }
        .s-group { margin-bottom:24px; }
        .s-label { display:block; font-size:0.9rem; font-weight:600; margin-bottom:8px; }
        .s-input, .s-textarea { width:100%; padding:14px; background:var(--bg3); border:1px solid var(--brd); border-radius:12px; font-size:1rem; }
        .s-input:focus, .s-textarea:focus { border-color:var(--primary); }
        .s-textarea { min-height:120px; resize:vertical; font-family:inherit; }
        .btn-primary { width:100%; padding:16px; background:var(--primary); color:white; border-radius:12px; font-weight:600; font-size:1rem; cursor:pointer; margin-bottom:12px; }
        .btn-danger { width:100%; padding:16px; background:#ef4444; color:white; border-radius:12px; font-weight:600; font-size:1rem; cursor:pointer; }

        .profile-card { display:flex; flex-direction:column; align-items:center; padding:32px 20px; text-align:center; }
        .profile-avatar-big { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem; font-weight:600; margin-bottom:16px; overflow:hidden; }
        .profile-avatar-big img { width:100%; height:100%; object-fit:cover; }
        .profile-name-big { font-size:1.3rem; font-weight:600; margin-bottom:4px; }
        .profile-email { color:var(--t3); font-size:0.9rem; margin-bottom:24px; }

        .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--bg4); color:var(--t1); padding:12px 20px; border-radius:24px; font-size:0.9rem; z-index:1000; opacity:0; transition:all 0.3s; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .footer-text { text-align:center; font-size:0.75rem; color:var(--t3); margin-top:8px; }
    </style>
