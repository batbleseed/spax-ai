<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10a37f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spax AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --primary: #10a37f; --primary-dark: #0d8c6d; --accent: #5436DA;
        }
        [data-theme="dark"] {
            --bg1:#0f0f0f; --bg2:#1a1a1a; --bg3:#262626; --bg4:#333;
            --t1:#fff; --t2:#b4b4b4; --t3:#777; --brd:#2a2a2a; --code:#1e1e1e; --overlay:rgba(0,0,0,0.6);
        }
        [data-theme="light"] {
            --bg1:#fff; --bg2:#f7f7f8; --bg3:#ececec; --bg4:#d9d9d9;
            --t1:#0d0d0d; --t2:#555; --t3:#888; --brd:#e5e5e5; --code:#f6f8fa; --overlay:rgba(0,0,0,0.4);
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg1); color:var(--t1);
            padding-top:var(--safe-top); padding-bottom:var(--safe-bottom);
            touch-action:manipulation;
        }
        button,input,textarea { font-family:inherit; border:none; outline:none; background:none; color:inherit; }
        ::-webkit-scrollbar { display:none; }

        /* ===== LAYOUT ===== */
        .app { display:flex; flex-direction:column; height:100vh; }

        /* ===== HEADER ===== */
        .header {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 16px; background:var(--bg2);
            border-bottom:1px solid var(--brd);
            flex-shrink:0; z-index:10;
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .header-title { font-size:1.1rem; font-weight:600; }
        .icon-btn {
            width:40px; height:40px; display:flex; align-items:center; justify-content:center;
            border-radius:50%; cursor:pointer; color:var(--t1); transition:background 0.2s;
        }
        .icon-btn:active { background:var(--bg3); }
        .profile-pic {
            width:32px; height:32px; border-radius:50%;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            display:flex; align-items:center; justify-content:center;
            color:white; font-weight:600; font-size:0.9rem; overflow:hidden;
        }
        .profile-pic img { width:100%; height:100%; object-fit:cover; }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex:1; overflow-y:auto; padding:16px 16px 140px 16px; /* Extra bottom padding so messages go higher */
            -webkit-overflow-scrolling:touch;
        }
        .chat-wrap { display:flex; flex-direction:column; gap:20px; }

        /* Welcome */
        .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:20px; }
        .w-logo { width:80px; height:80px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:white; margin-bottom:24px; box-shadow:0 10px 30px rgba(16,163,127,0.3); }
        .welcome h1 { font-size:1.8rem; margin-bottom:8px; }
        .welcome p { color:var(--t2); margin-bottom:32px; }
        .sug-list { display:flex; flex-direction:column; gap:10px; width:100%; }
        .sug-card { background:var(--bg2); border:1px solid var(--brd); border-radius:16px; padding:16px; text-align:left; cursor:pointer; }
        .sug-card:active { transform:scale(0.98); background:var(--bg3); }
        .sug-t { font-weight:600; font-size:0.95rem; margin-bottom:4px; }
        .sug-d { font-size:0.85rem; color:var(--t3); }

        /* Messages */
        .msg { display:flex; gap:12px; animation:slideUp 0.3s; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; flex-shrink:0; }
        .msg.user .avatar { background:var(--accent); color:white; }
        .msg.assistant .avatar { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; }
        .msg-content { flex:1; min-width:0; }
        .msg-role { font-weight:600; font-size:0.85rem; margin-bottom:4px; color:var(--t2); }
        .msg-bubble { font-size:1rem; line-height:1.6; word-wrap:break-word; overflow-wrap:break-word; }
        .msg.user .msg-bubble { background:var(--bg3); padding:12px 16px; border-radius:18px; display:inline-block; max-width:100%; }
        .msg-bubble p { margin-bottom:10px; } .msg-bubble p:last-child { margin-bottom:0; }
        .msg-bubble ul, .msg-bubble ol { margin:10px 0; padding-left:20px; }
        .msg-bubble code:not(pre code) { background:var(--code); padding:2px 6px; border-radius:4px; font-family:monospace; font-size:0.85em; color:#e06c75; }
        .msg-bubble pre { background:var(--code); padding:12px; border-radius:10px; overflow-x:auto; margin:10px 0; font-size:0.85rem; }
        .msg-actions { display:flex; gap:4px; margin-top:8px; }
        .m-btn { padding:6px 10px; font-size:0.75rem; color:var(--t3); border-radius:8px; cursor:pointer; background:var(--bg2); display:flex; align-items:center; gap:4px; }
        .m-btn:active { background:var(--bg3); }

        /* ===== INPUT AREA ===== */
        .input-area {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding:8px 12px calc(8px + var(--safe-bottom));
            background:var(--bg1); border-top:1px solid var(--brd);
            z-index: 5;
        }
        .input-box { display:flex; align-items:flex-end; gap:8px; background:var(--bg3); border-radius:24px; padding:8px 8px 8px 16px; border:1px solid var(--brd); }
        #user-input { flex:1; resize:none; font-size:1rem; line-height:1.4; max-height:120px; padding:8px 0; background:transparent; }
        .input-btn { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
        .input-btn:active { transform:scale(0.9); }
        .voice-btn { color:var(--t2); }
        .voice-btn.recording { background:#ef4444; color:white; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
        .send-btn { background:var(--primary); color:white; }
        .send-btn:disabled { background:var(--bg4); color:var(--t3); }
        .stop-btn { background:#ef4444; color:white; display:none; }
        .stop-btn.active { display:flex; }

        /* ===== DRAWER (Top Left Menu) ===== */
        .drawer-overlay { position:fixed; inset:0; background:var(--overlay); opacity:0; visibility:hidden; transition:0.3s; z-index:100; }
        .drawer-overlay.active { opacity:1; visibility:visible; }
        .drawer {
            position:fixed; top:0; left:0; height:100%; width:80%; max-width:300px;
            background:var(--bg2); transform:translateX(-100%); transition:transform 0.3s; z-index:101;
            display:flex; flex-direction:column; padding-top:var(--safe-top);
        }
        .drawer.active { transform:translateX(0); }
        .drawer-header { padding:20px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--brd); }
        .drawer-header h2 { font-size:1.2rem; }
        .drawer-list { flex:1; overflow-y:auto; padding:8px; }
        .chat-item { display:flex; align-items:center; padding:14px 12px; border-radius:12px; cursor:pointer; margin-bottom:4px; }
        .chat-item:active, .chat-item.active { background:var(--bg3); }
        .chat-item-title { flex:1; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        
        .drawer-menu-btn {
            display:flex; align-items:center; gap:12px; padding:16px; margin:8px 16px;
            background:var(--bg3); border-radius:12px; font-weight:600; font-size:1rem;
            cursor:pointer; transition:background 0.2s;
        }
        .drawer-menu-btn:active { background:var(--bg4); }
        .drawer-menu-btn svg { width:20px; height:20px; color:var(--primary); }

        /* ===== FULL-SCREEN MODALS ===== */
        .modal-full { position:fixed; inset:0; background:var(--bg1); transform:translateY(100%); transition:transform 0.3s; z-index:200; display:flex; flex-direction:column; padding-top:var(--safe-top); padding-bottom:var(--safe-bottom); }
        .modal-full.active { transform:translateY(0); }
        .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--brd); flex-shrink:0; }
        .modal-header h2 { font-size:1.2rem; }
        .modal-body { flex:1; overflow-y:auto; padding:20px 16px; }
        .s-group { margin-bottom:24px; }
        .s-label { display:block; font-size:0.9rem; font-weight:600; margin-bottom:8px; }
        .s-input, .s-textarea { width:100%; padding:14px; background:var(--bg3); border:1px solid var(--brd); border-radius:12px; font-size:1rem; }
        .s-input:focus, .s-textarea:focus { border-color:var(--primary); }
        .s-textarea { min-height:120px; resize:vertical; font-family:inherit; }
        .btn-primary { width:100%; padding:16px; background:var(--primary); color:white; border-radius:12px; font-weight:600; font-size:1rem; cursor:pointer; margin-bottom:12px; }
        .btn-danger { width:100%; padding:16px; background:#ef4444; color:white; border-radius:12px; font-weight:600; font-size:1rem; cursor:pointer; }

        .profile-card { display:flex; flex-direction:column; align-items:center; padding:32px 20px; text-align:center; }
        .profile-avatar-big { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center; color:white; font-size:2.5rem; font-weight:600; margin-bottom:16px; overflow:hidden; }
        .profile-avatar-big img { width:100%; height:100%; object-fit:cover; }
        .profile-name-big { font-size:1.3rem; font-weight:600; margin-bottom:4px; }
        .profile-email { color:var(--t3); font-size:0.9rem; margin-bottom:24px; }

        .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--bg4); color:var(--t1); padding:12px 20px; border-radius:24px; font-size:0.9rem; z-index:1000; opacity:0; transition:all 0.3s; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="icon-btn" id="btn-menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="header-title">Spax AI</div>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="icon-btn" id="btn-theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button class="icon-btn" id="btn-profile">
                    <div class="profile-pic" id="header-avatar">U</div>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
            <div class="chat-wrap" id="chat-wrap"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form id="input-form" class="input-box">
                <textarea id="user-input" placeholder="Message Spax AI..." rows="1"></textarea>
                <button type="button" class="input-btn voice-btn" id="btn-voice">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
                </button>
                <button type="button" class="input-btn stop-btn" id="btn-stop">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                </button>
                <button type="submit" class="input-btn send-btn" id="btn-send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Drawer (Top Left Menu) -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header">
            <h2>Menu</h2>
            <button class="icon-btn" id="btn-close-drawer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        
        <!-- Top Left Buttons -->
        <div class="drawer-menu-btn" id="menu-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Chat
        </div>
        <div class="drawer-menu-btn" id="menu-history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History
        </div>
        <div class="drawer-menu-btn" id="menu-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
        </div>

        <div style="padding:16px; border-top:1px solid var(--brd); margin-top:auto;">
            <button class="drawer-menu-btn" id="drawer-new" style="margin:0; background:var(--primary); color:white;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:white;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Chat
            </button>
        </div>
        
        <!-- Chat History List (Shows when History is clicked) -->
        <div class="drawer-list" id="drawer-list" style="display:none;"></div>
    </aside>

    <!-- Settings Modal -->
    <div class="modal-full" id="settings-modal">
        <div class="modal-header">
            <h2>Settings</h2>
            <button class="icon-btn" id="btn-close-settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="s-group"><label class="s-label">Backend Endpoint</label><input type="text" class="s-input" id="set-url" placeholder="https://..."></div>
            <div class="s-group"><label class="s-label">API Key</label><input type="password" class="s-input" id="set-key" placeholder="sk-... or gsk_..."></div>
            <div class="s-group"><label class="s-label">Base URL</label><input type="text" class="s-input" id="set-base" placeholder="https://api.groq.com/openai/v1"></div>
            <div class="s-group"><label class="s-label">Model</label><input type="text" class="s-input" id="set-model" placeholder="llama-3.3-70b-versatile"></div>
            <div class="s-group"><label class="s-label">System Prompt</label><textarea class="s-textarea" id="set-prompt"></textarea></div>
            <button class="btn-danger" id="btn-clear">Clear All Data</button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-full" id="profile-modal">
        <div class="modal-header">
            <h2>Profile</h2>
            <button class="icon-btn" id="btn-close-profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="profile-card">
                <div class="profile-avatar-big" id="profile-avatar-big">U</div>
                <div class="profile-name-big" id="profile-name-big">Guest User</div>
                <div class="profile-email" id="profile-email">Not signed in</div>
            </div>
            <button class="btn-primary" id="btn-login"> Sign in with Google</button>
            <button class="btn-danger" id="btn-logout" style="display:none;">Sign Out</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDmDII8ceiGGff8VDUbhFyWiFVhxIkGfNE", authDomain: "spax-ai.firebaseapp.com", projectId: "spax-ai", storageBucket: "spax-ai.firebasestorage.app", messagingSenderId: "924074191093", appId: "1:924074191093:web:b164bc2d54b351467a7dbc" };
        let auth, db;
        try { if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") { firebase.initializeApp(firebaseConfig); auth = firebase.auth(); db = firebase.firestore(); } } catch (e) { console.error(e); }

        const $ = id => document.getElementById(id);
        const state = { chats: {}, activeId: null, isGen: false, abort: null, showHistory: false,
            settings: { theme: 'dark', userName: 'You', userAvatar: 'U', apiUrl: 'https://hotfinixbrave-spax-ai-backend.hf.space/chat', apiKey: '', baseUrl: 'https://api.groq.com/openai/v1', model: 'llama-3.3-70b-versatile', systemPrompt: 'You are Spax AI, a helpful assistant. Format with Markdown.' }, user: null };

        if (auth) {
            auth.onAuthStateChanged(user => {
                state.user = user;
                if (user) {
                    $('header-avatar').innerHTML = user.photoURL ? `<img src="${user.photoURL}">` : (user.displayName || user.email)[0].toUpperCase();
                    $('profile-avatar-big').innerHTML = user.photoURL ? `<img src="${user.photoURL}">` : (user.displayName || user.email)[0].toUpperCase();
                    $('profile-name-big').textContent = user.displayName || 'User'; $('profile-email').textContent = user.email;
                    $('btn-login').style.display = 'none'; $('btn-logout').style.display = 'block';
                    loadUserData(user.uid);
                } else {
                    $('header-avatar').textContent = state.settings.userAvatar; $('profile-avatar-big').textContent = state.settings.userAvatar;
                    $('profile-name-big').textContent = state.settings.userName; $('profile-email').textContent = 'Not signed in';
                    $('btn-login').style.display = 'block'; $('btn-logout').style.display = 'none';
                }
            });
        }

        function init() {
            const saved = localStorage.getItem('spax_mobile');
            if (saved) { const d = JSON.parse(saved); state.chats = d.chats || {}; state.activeId = d.activeId || null; state.settings = { ...state.settings, ...d.settings }; }
            applyTheme(); renderDrawer(); state.activeId && state.chats[state.activeId] ? renderChat() : renderWelcome(); setupEvents(); autoResize();
        }

        async function loadUserData(uid) { try { const doc = await db.collection('users').doc(uid).get(); if (doc.exists) { state.chats = doc.data().chats || state.chats; state.settings = { ...state.settings, ...doc.data().settings }; state.activeId = doc.data().activeId || state.activeId; renderDrawer(); renderChat(); } } catch (e) {} }
        async function saveUserData() { if (!state.user || !db) return; try { await db.collection('users').doc(state.user.uid).set({ chats: state.chats, activeId: state.activeId, settings: state.settings, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); } catch (e) {} }
        function save() { localStorage.setItem('spax_mobile', JSON.stringify({ chats: state.chats, activeId: state.activeId, settings: state.settings })); if (state.user) saveUserData(); }

        function renderDrawer() {
            const list = $('drawer-list');
            const sorted = Object.values(state.chats).sort((a,b) => b.createdAt - a.createdAt);
            if (!sorted.length) { list.innerHTML = '<div style="padding:40px 20px; text-align:center; color:var(--t3);">No chats yet</div>'; return; }
            list.innerHTML = sorted.map(c => `<div class="chat-item ${c.id === state.activeId ? 'active' : ''}" data-id="${c.id}"><div class="chat-item-title">${esc(c.title)}</div><button class="icon-btn" style="width:32px;height:32px;" onclick="deleteChat('${c.id}', event)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>`).join('');
            list.querySelectorAll('.chat-item').forEach(el => { el.onclick = (e) => { if (e.target.closest('.icon-btn')) return; switchChat(el.dataset.id); closeDrawer(); }; });
        }

        function renderWelcome() { $('chat-wrap').innerHTML = `<div class="welcome"><div class="w-logo">
    <img src="spax-ai.png" alt="Spax AI Logo" style="width: 60%; height: 60%; object-fit: contain;">
</div>h1>Spax AI</h1><p>Your intelligent mobile assistant</p><div class="sug-list"><div class="sug-card" onclick="useSug('Explain quantum computing simply')"><div class="sug-t">💡 Explain a concept</div><div class="sug-d">Quantum computing in simple terms</div></div><div class="sug-card" onclick="useSug('Write a Python script')"><div class="sug-t">💻 Write code</div><div class="sug-d">Python script example</div></div><div class="sug-card" onclick="useSug('Give me 5 story ideas')"><div class="sug-t"> Brainstorm</div><div class="sug-d">5 creative story ideas</div></div></div></div>`; }
        function renderChat() { const c = state.chats[state.activeId]; if (!c) return renderWelcome(); $('chat-wrap').innerHTML = ''; c.messages.forEach(m => appendMsg(m.role, m.content, false)); scrollDown(); }
        function appendMsg(role, content, anim=true) {
            const w = $('chat-wrap'); if (w.querySelector('.welcome')) w.innerHTML = '';
            const isUser = role === 'user'; const name = isUser ? state.settings.userName : 'Spax AI'; const av = isUser ? state.settings.userAvatar : 'S';
            const div = document.createElement('div'); div.className = `msg ${role}`; if (!anim) div.style.animation = 'none';
            div.innerHTML = `<div class="avatar">${av}</div><div class="msg-content"><div class="msg-role">${name}</div><div class="msg-bubble">${isUser ? esc(content).replace(/\n/g,'<br>') : renderMd(content)}</div>${!isUser ? `<div class="msg-actions"><div class="m-btn" onclick="copyMsg(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</div><div class="m-btn" onclick="regen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Retry</div></div>` : ''}</div>`;
            w.appendChild(div); scrollDown(); return div;
        }

        async function send() {
            const txt = $('user-input').value.trim(); if (!txt || state.isGen) return;
            if (!state.activeId) newChat(); const c = state.chats[state.activeId];
            if (c.messages.length === 0) { c.title = txt.substring(0, 30); renderDrawer(); }
            c.messages.push({ role: 'user', content: txt }); appendMsg('user', txt);
            $('user-input').value = ''; autoResize(); save(); state.isGen = true; toggleUI(true);
            let full = '', aiEl = null, contentDiv = null;
            try {
                state.abort = new AbortController();
                const res = await fetch(state.settings.apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: [{ role: 'system', content: state.settings.systemPrompt }, ...c.messages], api_key: state.settings.apiKey, base_url: state.settings.baseUrl, model: state.settings.model }), signal: state.abort.signal });
                if (!res.ok) throw new Error(`Server ${res.status}`);
                aiEl = appendMsg('assistant', ''); contentDiv = aiEl.querySelector('.msg-bubble');
                const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
                while (true) { const { done, value } = await reader.read(); if (done) break; buf += dec.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop(); for (const line of lines) { if (line.startsWith('data: ')) { const d = line.slice(6); if (d === '[DONE]') break; full += d; contentDiv.innerHTML = renderMd(full); scrollDown(); } } }
                c.messages.push({ role: 'assistant', content: full }); save();
            } catch (e) {
                if (e.name === 'AbortError' && full) { if (!aiEl) aiEl = appendMsg('assistant', ''); aiEl.querySelector('.msg-bubble').innerHTML = renderMd(full + '\n\n*[Stopped]*'); c.messages.push({ role: 'assistant', content: full }); save(); }
                else { if (!aiEl) aiEl = appendMsg('assistant', ''); aiEl.querySelector('.msg-bubble').innerHTML = `<span style="color:#ef4444;">Error: ${e.message}</span>`; }
            } finally { state.isGen = false; state.abort = null; toggleUI(false); }
        }

        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) { const SR = window.SpeechRecognition || window.webkitSpeechRecognition; recognition = new SR(); recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US'; recognition.onresult = (e) => { let final = ''; for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) final += e.results[i][0].transcript; } if (final) { $('user-input').value += ($('user-input').value ? ' ' : '') + final; autoResize(); } }; recognition.onend = () => $('btn-voice').classList.remove('recording'); recognition.onerror = () => $('btn-voice').classList.remove('recording'); }

        function openDrawer() { $('drawer').classList.add('active'); $('drawer-overlay').classList.add('active'); }
        function closeDrawer() { $('drawer').classList.remove('active'); $('drawer-overlay').classList.remove('active'); $('drawer-list').style.display = 'none'; document.querySelectorAll('.drawer-menu-btn').forEach(b => b.style.display = 'flex'); }

        function setupEvents() {
            $('input-form').onsubmit = e => { e.preventDefault(); send(); };
            $('user-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
            $('user-input').oninput = autoResize;
            $('btn-stop').onclick = () => state.abort && state.abort.abort();
            $('btn-menu').onclick = openDrawer;
            $('btn-close-drawer').onclick = closeDrawer;
            $('drawer-overlay').onclick = closeDrawer;
            
            // Top Left Menu Buttons
            $('menu-chat').onclick = () => { closeDrawer(); renderChat(); };
            $('menu-history').onclick = () => { 
                document.querySelectorAll('.drawer-menu-btn').forEach(b => b.style.display = 'none'); 
                $('drawer-list').style.display = 'block'; 
                renderDrawer(); 
            };
            $('menu-settings').onclick = () => {
                closeDrawer();
                $('set-url').value = state.settings.apiUrl; $('set-key').value = state.settings.apiKey; $('set-base').value = state.settings.baseUrl; $('set-model').value = state.settings.model; $('set-prompt').value = state.settings.systemPrompt;
                $('settings-modal').classList.add('active');
            };
            $('drawer-new').onclick = () => { newChat(); closeDrawer(); };
            
            $('btn-theme').onclick = () => { state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark'; applyTheme(); save(); };
            $('btn-voice').onclick = () => { if (!recognition) { toast('Voice not supported'); return; } if ($('btn-voice').classList.contains('recording')) { recognition.stop(); } else { recognition.start(); $('btn-voice').classList.add('recording'); } };
            $('btn-profile').onclick = () => $('profile-modal').classList.add('active');
            $('btn-close-profile').onclick = () => $('profile-modal').classList.remove('active');
            $('btn-login').onclick = () => { if (!auth) { toast('Firebase not configured'); return; } auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => toast('Login failed')); };
            $('btn-logout').onclick = () => auth && auth.signOut();
            $('btn-close-settings').onclick = () => $('settings-modal').classList.remove('active');
            ['set-url','set-key','set-base','set-model','set-prompt'].forEach(id => { $(id).onchange = () => { state.settings.apiUrl = $('set-url').value; state.settings.apiKey = $('set-key').value; state.settings.baseUrl = $('set-base').value; state.settings.model = $('set-model').value; state.settings.systemPrompt = $('set-prompt').value; save(); }; });
            $('btn-clear').onclick = () => { if (confirm('Delete ALL data?')) { localStorage.removeItem('spax_mobile'); location.reload(); } };
        }

        function newChat() { const id = 'c_' + Date.now(); state.chats[id] = { id, title: 'New Chat', messages: [], createdAt: Date.now() }; state.activeId = id; save(); renderDrawer(); renderChat(); $('user-input').focus(); }
        function switchChat(id) { if (state.isGen) return; state.activeId = id; save(); renderDrawer(); renderChat(); }
        function deleteChat(id, e) { e.stopPropagation(); if (!confirm('Delete this chat?')) return; delete state.chats[id]; if (state.activeId === id) state.activeId = Object.keys(state.chats).pop() || null; save(); renderDrawer(); state.activeId ? renderChat() : renderWelcome(); }
        function useSug(t) { $('user-input').value = t; send(); }
        function regen() { if (state.isGen) return; const c = state.chats[state.activeId]; if (!c) return; if (c.messages[c.messages.length-1].role === 'assistant') c.messages.pop(); const last = c.messages.pop(); save(); renderChat(); $('user-input').value = last.content; send(); }
        function copyMsg(btn) { navigator.clipboard.writeText(btn.closest('.msg-content').querySelector('.msg-bubble').innerText); toast('Copied!'); }
        function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function scrollDown() { requestAnimationFrame(() => $('chat-area').scrollTop = $('chat-area').scrollHeight); }
        function autoResize() { const i = $('user-input'); i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 120) + 'px'; }
        function toggleUI(isGen) { $('btn-send').style.display = isGen ? 'none' : 'flex'; $('btn-stop').classList.toggle('active', isGen); $('user-input').disabled = isGen; }
        function applyTheme() { document.documentElement.setAttribute('data-theme', state.settings.theme); }
        function renderMd(t) { if (!t) return ''; marked.setOptions({ breaks: true, gfm: true }); return marked.parse(t); }

        init();
    </script>
</body>
</html>
