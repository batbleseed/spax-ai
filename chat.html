<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spax AI</title><link rel="stylesheet" href="style.css"></head>
<body class="chatbody">
<div class="space"></div>
<div class="sidebar">
<div class="logo">✦ SPAX AI</div>
<button class="primary full" onclick="newChat()">+ New Chat</button>
<div id="chatList" class="chatlist"></div>
<div class="bottom">
<button class="secondary full" onclick="setApiKey()">API Key</button>
<a class="secondary full home" href="index.html">Home</a>
</div>
</div>
<div class="main">
<div class="topbar"><span>Spax AI</span><select id="model"><option>llama-3.3-70b-versatile</option><option>deepseek-r1-distill-llama-70b</option></select></div>
<div id="messages" class="messages"></div>
<div class="composer"><input id="message" placeholder="Message Spax AI..." onkeydown="if(event.key==='Enter')sendMessage()"><button onclick="sendMessage()">➜</button></div>
</div>
<script src="app.js"></script></body></html>
