<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spax AI</title>
   <link rel="icon" type="image/png" href="logo.png">


   
   
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --sidebar-w: 280px; --max-w: 800px; --rad: 12px; --rad-sm: 8px; --trans: 0.3s; }
        [data-theme="dark"] { --bg1:#1a1a1a; --bg2:#212121; --bg3:#2f2f2f; --bg-h:#3a3a3a; --bg-a:#444; --t1:#ececec; --t2:#b4b4b4; --t3:#8e8e8e; --acc:#10a37f; --acc-h:#0d8c6d; --acc-l:rgba(16,163,127,0.15); --brd:#3a3a3a; --code:#1e1e1e; }
        [data-theme="light"] { --bg1:#fff; --bg2:#f9f9f9; --bg3:#f0f0f0; --bg-h:#e5e5e5; --bg-a:#dcdcdc; --t1:#1a1a1a; --t2:#555; --t3:#888; --acc:#10a37f; --acc-h:#0d8c6d; --acc-l:rgba(16,163,127,0.1); --brd:#e0e0e0; --code:#f6f8fa; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:system-ui,sans-serif; background:var(--bg1); color:var(--t1); height:100vh; display:flex; overflow:hidden; transition:background var(--trans); }
        button,input,textarea { font-family:inherit; border:none; outline:none; background:none; color:inherit; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--t3); border-radius:3px; }

        .app { display:flex; width:100%; height:100%; }
        .sidebar { width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--brd); display:flex; flex-direction:column; transition:width var(--trans); overflow:hidden; flex-shrink:0; }
        .sidebar.collapsed { width:0; border-right:none; }
        .side-h { padding:16px; display:flex; gap:10px; }
        .btn-new { flex:1; padding:12px; background:var(--bg3); border:1px solid var(--brd); border-radius:var(--rad-sm); font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-new:hover { background:var(--bg-h); }
        .history { flex:1; overflow-y:auto; padding:0 12px 12px; }
        .hist-title { font-size:0.75rem; color:var(--t3); text-transform:uppercase; padding:12px 8px 6px; }
        .chat-item { display:flex; align-items:center; padding:10px 12px; border-radius:var(--rad-sm); cursor:pointer; font-size:0.9rem; color:var(--t2); margin-bottom:2px; }
        .chat-item:hover { background:var(--bg-h); color:var(--t1); }
        .chat-item.active { background:var(--bg-a); color:var(--t1); }
        .chat-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-actions { display:none; gap:4px; }
        .chat-item:hover .chat-actions { display:flex; }
        .c-btn { width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:4px; color:var(--t3); cursor:pointer; }
        .c-btn:hover { background:var(--bg3); color:var(--t1); }
        .side-f { padding:12px; border-top:1px solid var(--brd); }

        .main { flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden; }
        .main-h { height:60px; display:flex; align-items:center; padding:0 20px; border-bottom:1px solid var(--brd); gap:12px; justify-content:space-between; }
        .main-h-left { display:flex; align-items:center; gap:12px; }
        .main-h h1 { font-size:1.1rem; font-weight:600; }
        .h-actions { display:flex; gap:8px; align-items:center; }
        .icon-btn { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:var(--rad-sm); cursor:pointer; color:var(--t2); position:relative; }
        .icon-btn:hover { background:var(--bg-h); color:var(--t1); }
        
      .profile-btn { display:flex; align-items:center; gap:8px; padding:6px 12px; background:var(--bg3); border-radius:20px; cursor:pointer; position: relative; }
        .profile-btn:hover { background:var(--bg-h); }
        .profile-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--acc),var(--acc-h)); display:flex; align-items:center; justify-content:center; font-weight:bold; color:white; }
        .profile-name { font-size:0.9rem; font-weight:500; }

        .chat-area { flex:1; overflow-y:auto; padding:20px; }
        .chat-wrap { max-width:var(--max-w); margin:0 auto; display:flex; flex-direction:column; gap:24px; }
        
        .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; }
        .w-logo { width:60px; height:60px; background:linear-gradient(135deg,var(--acc),var(--acc-h)); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white; margin-bottom:20px; }
        .sug-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; width:100%; max-width:700px; margin-top:40px; }
        .sug-card { background:var(--bg2); border:1px solid var(--brd); border-radius:var(--rad); padding:16px; text-align:left; cursor:pointer; transition:transform 0.2s, border-color 0.2s; }
        .sug-card:hover { border-color:var(--acc); transform:translateY(-2px); }
        .sug-t { font-weight:600; margin-bottom:4px; }
        .sug-d { font-size:0.85rem; color:var(--t3); }

        .msg { display:flex; gap:16px; animation:fade 0.3s; }
        @keyframes fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:bold; flex-shrink:0; font-size:1.2rem; }
        .msg.user .avatar { background:#5436DA; color:white; font-size:0.9rem; }
        .msg.assistant .avatar { background:linear-gradient(135deg,var(--acc),var(--acc-h)); color:white; }
        .msg-content { flex:1; min-width:0; }
        .msg-role { font-weight:600; font-size:0.9rem; margin-bottom:4px; }
        .msg-bubble { font-size:0.95rem; line-height:1.7; }
        .msg.user .msg-bubble { background:var(--bg3); padding:12px 16px; border-radius:var(--rad); display:inline-block; }
        .msg-actions { display:flex; gap:8px; margin-top:8px; opacity:0; transition:opacity 0.2s; }
        .msg:hover .msg-actions { opacity:1; }
        .m-btn { display:flex; align-items:center; gap:4px; padding:4px 8px; font-size:0.8rem; color:var(--t3); border-radius:6px; cursor:pointer; }
        .m-btn:hover { background:var(--bg-h); color:var(--t1); }
        .m-btn svg { width:14px; height:14px; }

        .file-attachments { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .file-tag { background:var(--bg-h); padding:4px 8px; border-radius:6px; font-size:0.8rem; display:flex; align-items:center; gap:4px; }
        .file-tag button { cursor:pointer; color:var(--t3); }
        .file-tag button:hover { color:var(--t1); }

      .msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { 
    margin: 16px 0 8px; 
    font-weight: 600; 
    line-height: 1.3; 
}
.msg-bubble h1 { font-size: 1.5rem; }
.msg-bubble h2 { font-size: 1.35rem; }
.msg-bubble h3 { font-size: 1.2rem; }
.msg-bubble h4 { font-size: 1.1rem; }
.msg-bubble h5 { font-size: 1rem; }
.msg-bubble h6 { font-size: 0.95rem; }
.msg-bubble strong { font-weight: 700; }
.msg-bubble em { font-style: italic; }
.msg-bubble a { color: var(--primary); text-decoration: underline; }
.msg-bubble ul, .msg-bubble ol { margin: 10px 0; padding-left: 20px; }
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble blockquote { 
    border-left: 3px solid var(--primary); 
    padding-left: 12px; 
    margin: 12px 0; 
    color: var(--t2); 
    font-style: italic; 
}
.msg-bubble pre { 
    background: var(--code); 
    padding: 12px; 
    border-radius: 8px; 
    overflow-x: auto; 
    margin: 10px 0; 
    font-size: 0.85rem; 
}
.msg-bubble code { 
    background: var(--code); 
    padding: 2px 6px; 
    border-radius: 4px; 
    font-family: monospace; 
    font-size: 0.85em; 
}
.msg-bubble pre code { 
    background: none; 
    padding: 0; 
}
.msg-bubble hr {
    border: none;
    border-top: 1px solid var(--brd);
    margin: 16px 0;
}
        .code-wrap { position:relative; margin:16px 0; border-radius:var(--rad-sm); overflow:hidden; border:1px solid var(--brd); }
        .code-h { display:flex; justify-content:space-between; padding:8px 16px; background:#282c34; border-bottom:1px solid #3e4451; font-size:0.8rem; color:#abb2bf; }
        .copy-btn { cursor:pointer; display:flex; align-items:center; gap:4px; }
        .copy-btn:hover { color:#fff; }
        .code-wrap pre { margin:0; padding:16px; overflow-x:auto; background:var(--code) !important; }
        .code-wrap pre code { font-family:monospace; font-size:0.85rem; line-height:1.5; }

        .input-area { padding:16px 20px 24px; }
        .input-wrap { max-width:var(--max-w); margin:0 auto; }
        .input-box { display:flex; flex-direction:column; background:var(--bg3); border:1px solid var(--brd); border-radius:16px; padding:12px 16px; transition:border-color 0.2s; }
        .input-box:focus-within { border-color:var(--acc); box-shadow:0 0 0 2px var(--acc-l); }
        .file-preview { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
        .file-item { background:var(--bg-h); padding:6px 12px; border-radius:8px; font-size:0.85rem; display:flex; align-items:center; gap:6px; }
        .file-item button { cursor:pointer; color:var(--t3); font-size:1rem; line-height:1; }
        .file-item button:hover { color:var(--t1); }
        .input-row { display:flex; align-items:flex-end; gap:8px; }
        #user-input { flex:1; resize:none; font-size:1rem; line-height:1.5; max-height:200px; padding:4px 0; background:transparent; }
        .input-actions { display:flex; gap:8px; align-items:center; }
        .send-btn, .voice-btn, .file-btn { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; }
        .send-btn { background:var(--acc); color:white; }
        .send-btn:hover { background:var(--acc-h); }
        .send-btn:disabled { background:var(--bg-h); color:var(--t3); cursor:not-allowed; }
        .voice-btn { background:var(--bg-h); color:var(--t2); }
        .voice-btn:hover { background:var(--bg-a); color:var(--t1); }
        .voice-btn.recording { background:#ef4444; color:white; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform:scale(1); } 50% { transform:scale(1.1); } }
        .file-btn { background:var(--bg-h); color:var(--t2); }
        .file-btn:hover { background:var(--bg-a); color:var(--t1); }
        .stop-btn { width:36px; height:36px; background:#ef4444; color:white; border-radius:10px; display:none; align-items:center; justify-content:center; cursor:pointer; }
        .stop-btn.active { display:flex; }
        .footer-text { text-align:center; font-size:0.75rem; color:var(--t3); margin-top:8px; }

        .modal-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; visibility:hidden; transition:0.2s; }
        .modal-bg.active { opacity:1; visibility:visible; }
        .modal { background:var(--bg2); border:1px solid var(--brd); border-radius:var(--rad); width:90%; max-width:500px; max-height:85vh; overflow-y:auto; }
        .modal-h { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--brd); }
        .modal-b { padding:24px; }
        .s-group { margin-bottom:20px; }
        .s-label { display:block; font-size:0.9rem; font-weight:500; margin-bottom:8px; }
        .s-desc { font-size:0.8rem; color:var(--t3); margin-bottom:8px; }
        .s-input, .s-textarea { width:100%; padding:10px 12px; background:var(--bg3); border:1px solid var(--brd); border-radius:var(--rad-sm); font-size:0.9rem; transition:border 0.2s; }
        .s-input:focus, .s-textarea:focus { border-color:var(--acc); }
        .s-textarea { min-height:80px; resize:vertical; }
        .row { display:flex; gap:10px; }
        .btn-primary { background:var(--acc); color:white; padding:10px 20px; border-radius:var(--rad-sm); cursor:pointer; font-weight:500; }
        .btn-primary:hover { background:var(--acc-h); }
        .btn-danger { background:#ef4444; color:white; padding:10px 20px; border-radius:var(--rad-sm); cursor:pointer; font-weight:500; }
        .btn-danger:hover { background:#dc2626; }

        .dropdown { position:absolute; top:100%; right:0; margin-top:8px; background:var(--bg2); border:1px solid var(--brd); border-radius:var(--rad-sm); box-shadow:var(--shadow); min-width:200px; z-index:100; display:none; }
        .dropdown.active { display:block; }
        .dropdown-item { padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .dropdown-item:hover { background:var(--bg-h); }
        .dropdown-divider { height:1px; background:var(--brd); margin:4px 0; }

        @media (max-width: 768px) {
            .sidebar { position:absolute; height:100%; z-index:100; box-shadow:0 0 20px rgba(0,0,0,0.5); }
            .sidebar.collapsed { transform:translateX(-100%); width:var(--sidebar-w); }
            .sug-grid { grid-template-columns:1fr; }
            .profile-name { display:none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="side-h">
                <button class="btn-new" id="btn-new">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="history" id="history"><div class="hist-title">Recent</div></div>
            <div class="side-f">
                <button class="btn-new" id="btn-settings" style="width:100%;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>

                </button>
            </div>
        </aside>

        <main class="main">
            <header class="main-h">
                <div class="main-h-left">
                    <button class="icon-btn" id="btn-toggle" title="Toggle Sidebar">

                    </button>
                    <h1>Spax AI</h1>
                </div>
                <div class="h-actions">
                    <button class="icon-btn" id="btn-theme" title="Toggle Theme">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <div class="profile-btn" id="profile-btn">
                        <div class="profile-avatar" id="profile-avatar">U</div>
                        <span class="profile-name" id="profile-name">User</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        <div class="dropdown" id="profile-dropdown">
                            <div class="dropdown-item" id="menu-profile">👤 Profile Settings</div>
                            <div class="dropdown-item" id="menu-login">🔐 Sign In</div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item" id="menu-logout" style="display:none;">🚪 Sign Out</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="chat-area" id="chat-area">
                <div class="chat-wrap" id="chat-wrap"></div>

                    <form id="input-form" class="input-box">

                <button class="icon-btn" id="btn-close-settings"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>

                    <label class="s-label">System Prompt</label>

                </div>
                <button class="btn-danger" id="btn-clear" style="width:100%;">Clear All Data</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration - REPLACE WITH YOUR OWN!
        const firebaseConfig = {
  
  apiKey: "AIzaSyDmDII8ceiGGff8VDUbhFyWiFVhxIkGfNE",
  authDomain: "spax-ai.firebaseapp.com",
  projectId: "spax-ai",
  storageBucket: "spax-ai.firebasestorage.app",
  messagingSenderId: "924074191093",
  appId: "1:924074191093:web:b164bc2d54b351467a7dbc"
}


        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const $ = id => document.getElementById(id);
        const state = {
            chats: {}, activeId: null, isGen: false, abort: null,
            files: [],
            settings: {
                theme: 'dark', userName: 'You', userAvatar: 'U',
                apiUrl: 'https://hotfinixbrave-spax-ai-backend.hf.space/chat', 
                apiKey: '', baseUrl: 'https://api.groq.com/openai/v1', 
                model: 'llama-3.3-70b-versatile',
                systemPrompt: 'You are Spax AI, a highly intelligent, friendly, and helpful AI assistant. Always format using Markdown.'
            },
            user: null
        };

        // Auth State Observer
        auth.onAuthStateChanged(user => {
            state.user = user;
            if (user) {
                $('profile-name').textContent = user.displayName || user.email.split('@')[0];
                $('profile-avatar').textContent = user.photoURL ? '' : (user.displayName || user.email)[0].toUpperCase();
                if (user.photoURL) $('profile-avatar').innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%;">`;
                $('menu-login').style.display = 'none';
                $('menu-logout').style.display = 'flex';
                loadUserData(user.uid);
            } else {
                $('profile-name').textContent = state.settings.userName;
                $('profile-avatar').textContent = state.settings.userAvatar;
                $('menu-login').style.display = 'flex';
                $('menu-logout').style.display = 'none';
            }
        });

        function init() {
            const saved = localStorage.getItem('spax_data');
            if (saved) {
                const d = JSON.parse(saved);
                state.chats = d.chats || {};
                state.activeId = d.activeId || null;
                state.settings = { ...state.settings, ...d.settings };
            }
            applyTheme();
            renderSidebar();
            state.activeId && state.chats[state.activeId] ? renderChat() : renderWelcome();
            setupEvents();
            autoResize();
        }

        async function loadUserData(uid) {
            try {
                const doc = await db.collection('users').doc(uid).get();
                if (doc.exists) {
                    const data = doc.data();
                    state.chats = data.chats || {};
                    state.settings = { ...state.settings, ...data.settings };
                    state.activeId = data.activeId || null;
                    renderSidebar();
                    renderChat();
                }
            } catch (e) {
                console.error('Error loading user data:', e);
            }
        }

        async function saveUserData() {
            if (!state.user) return;
            try {
                await db.collection('users').doc(state.user.uid).set({
                    chats: state.chats,
                    activeId: state.activeId,
                    settings: state.settings,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch (e) {
                console.error('Error saving user data:', e);
            }
        }

        function saveLocal() { 
            localStorage.setItem('spax_data', JSON.stringify({ chats: state.chats, activeId: state.activeId, settings: state.settings })); 
            if (state.user) saveUserData();
        }

        function renderSidebar() {
            const h = $('history');
            h.innerHTML = '<div class="hist-title">Recent</div>';
            const sorted = Object.values(state.chats).sort((a,b) => b.createdAt - a.createdAt);
            if(!sorted.length) { h.innerHTML += '<div style="padding:12px; color:var(--t3); font-size:0.85rem; text-align:center;">No chats yet</div>'; return; }
            sorted.forEach(c => {
                const el = document.createElement('div');
                el.className = `chat-item ${c.id === state.activeId ? 'active' : ''}`;
                el.onclick = () => switchChat(c.id);
                el.innerHTML = `<span class="chat-title">${esc(c.title)}</span>
                    <div class="chat-actions">
                        <div class="c-btn" onclick="renameChat('${c.id}', event)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div>
                        <div class="c-btn" onclick="deleteChat('${c.id}', event)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div>
                    </div>`;
                h.appendChild(el);
            });
        }

        function renderWelcome() {
            $('chat-wrap').innerHTML = `
                <div class="welcome">
                    <div class="w-logo">
    <img src="spax-ai.png" alt="Spax AI Logo" style="width: 60%; height: 60%; object-fit: contain;">
</div>
                    <h1 style="font-size:2rem; margin-bottom:8px;">How can I help you today?</h1>
                    <p style="color:var(--t2);">I'm Spax AI, your intelligent assistant.</p>
                    <div class="sug-grid">
                        <div class="sug-card" onclick="useSug('Explain quantum computing simply')"><div class="sug-t">Explain a concept</div><div class="sug-d">Quantum computing simply</div></div>
                        <div class="sug-card" onclick="useSug('Write a Python script to scrape a website')"><div class="sug-t">Write code</div><div class="sug-d">Python web scraper</div></div>
                        <div class="sug-card" onclick="useSug('Give me 5 sci-fi story ideas')"><div class="sug-t">Brainstorm</div><div class="sug-d">5 sci-fi story ideas</div></div>
                        <div class="sug-card" onclick="useSug('Analyze this data and find patterns')"><div class="sug-t">Analyze data</div><div class="sug-d">Upload a file to analyze</div></div>
                    </div>
                </div>`;
        }

        function renderChat() {
            const c = state.chats[state.activeId];
            if(!c) return renderWelcome();
            $('chat-wrap').innerHTML = '';
            c.messages.forEach(m => appendMsg(m.role, m.content, m.files || [], false));
            scrollDown();
        }

        function appendMsg(role, content, files=[], anim=true) {
            const w = $('chat-wrap');
            if(w.querySelector('.welcome')) w.innerHTML = '';
            const isUser = role === 'user';
            const name = isUser ? state.settings.userName : 'Spax AI';
            const av = isUser ? state.settings.userAvatar : 'S';
            
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            if(!anim) div.style.animation = 'none';
            
            let fileHtml = '';
            if (files.length > 0) {
                fileHtml = `<div class="file-attachments">${files.map(f => `<span class="file-tag">📎 ${f.name}</span>`).join('')}</div>`;
            }
            
            div.innerHTML = `
                <div class="avatar">${av}</div>
                <div class="msg-content">
                    <div class="msg-role">${name}</div>
                    ${fileHtml}
                    <div class="msg-bubble">${isUser ? esc(content).replace(/\n/g,'<br>') : renderMd(content)}</div>
                    ${!isUser ? `<div class="msg-actions">
                        <div class="m-btn" onclick="copyMsg(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy</div>
                        <div class="m-btn" onclick="regen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg> Regenerate</div>
                    </div>` : ''}
                </div>`;
            w.appendChild(div);
            highlightCode(div);
            scrollDown();
            return div;
        }

        async function send() {
            const txt = $('user-input').value.trim();
            if((!txt && state.files.length === 0) || state.isGen) return;
            if(!state.activeId) newChat();
            const c = state.chats[state.activeId];
            if(c.messages.length === 0) { c.title = txt.substring(0, 30) || 'File Upload'; renderSidebar(); }
            
            const filesData = state.files.map(f => ({ name: f.name, type: f.type }));
            c.messages.push({role:'user', content: txt || 'Please analyze these files', files: filesData});
            appendMsg('user', txt || 'Please analyze these files', filesData);
            
            $('user-input').value = ''; autoResize(); 
            clearFiles();
            saveLocal();
            
            state.isGen = true; toggleUI(true);
            let full = '', aiEl = null, contentDiv = null;

            try {
                state.abort = new AbortController();
                const payload = {
                    messages: [{role:'system', content:state.settings.systemPrompt}, ...c.messages],
                    api_key: state.settings.apiKey,
                    base_url: state.settings.baseUrl,
                    model: state.settings.model,
                    files: filesData
                };
                
                const res = await fetch(state.settings.apiUrl, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload), signal: state.abort.signal
                });
                if(!res.ok) throw new Error(`Server Error: ${res.status}`);

                aiEl = appendMsg('assistant', '', []);
                contentDiv = aiEl.querySelector('.msg-bubble');
                const reader = res.body.getReader();
                const dec = new TextDecoder();
                let buf = '';

                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    buf += dec.decode(value, {stream:true});
                    const lines = buf.split('\n'); buf = lines.pop();
                    for(const line of lines) {
                        if(line.startsWith('data: ')) {
                            const d = line.slice(6);
                            if(d === '[DONE]') break;
                            full += d;
                            contentDiv.innerHTML = renderMd(full);
                            highlightCode(aiEl);
                            scrollDown();
                        }
                    }
                }
                c.messages.push({role:'assistant', content:full}); saveLocal();
            } catch(e) {
                if(e.name === 'AbortError') {
                    if(full) {
                        if(!aiEl) aiEl = appendMsg('assistant', '', []);
                        contentDiv = aiEl.querySelector('.msg-bubble');
                        contentDiv.innerHTML = renderMd(full + '\n\n*[Stopped]*');
                        c.messages.push({role:'assistant', content:full}); saveLocal();
                    }
                } else {
                    if(!aiEl) aiEl = appendMsg('assistant', '', []);
                    aiEl.querySelector('.msg-bubble').innerHTML = `<span style="color:#ef4444;">Error: ${e.message}. Check your Backend URL and Settings.</span>`;
                }
            } finally {
                state.isGen = false; state.abort = null; toggleUI(false);
            }
        }

        // Voice Input
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    }
                }
                if (finalTranscript) {
                    $('user-input').value += ($('user-input').value ? ' ' : '') + finalTranscript;
                    autoResize();
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                $('btn-voice').classList.remove('recording');
            };

            recognition.onend = () => {
                $('btn-voice').classList.remove('recording');
            };
        }

        $('btn-voice').onclick = () => {
            if (!recognition) {
                alert('Speech recognition is not supported in your browser. Try Chrome or Edge.');
                return;
            }
            if ($('btn-voice').classList.contains('recording')) {
                recognition.stop();
                $('btn-voice').classList.remove('recording');
            } else {
                recognition.start();
                $('btn-voice').classList.add('recording');
            }
        };

        // File Upload
        $('btn-file').onclick = () => $('file-input').click();
        $('file-input').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const res = await fetch(state.settings.apiUrl.replace('/chat', '/upload'), {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    state.files.push({ name: file.name, type: file.type, content: data.content });
                    renderFilePreview();
                } catch (err) {
                    console.error('Upload error:', err);
                    alert(`Failed to upload ${file.name}`);
                }
            }
            $('file-input').value = '';
        };

        function renderFilePreview() {
            const container = $('file-preview');
            container.innerHTML = state.files.map((f, i) => `
                <div class="file-item">
                    📎 ${f.name}
                    <button onclick="removeFile(${i})">×</button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            state.files.splice(index, 1);
            renderFilePreview();
        }

        function clearFiles() {
            state.files = [];
            renderFilePreview();
        }

        // Google Sign In
        $('menu-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => {
                console.error('Login error:', err);
                alert('Login failed: ' + err.message);
            });
        };

        $('menu-logout').onclick = () => {
            auth.signOut();
        };

        // Profile dropdown
        $('profile-btn').onclick = (e) => {
            e.stopPropagation();
            $('profile-dropdown').classList.toggle('active');
        };

        document.addEventListener('click', () => {
            $('profile-dropdown').classList.remove('active');
        });

        $('menu-profile').onclick = () => {
            $('set-name').value = state.settings.userName;
            $('set-avatar').value = state.settings.userAvatar;
            $('profile-modal').classList.add('active');
        };

        $('btn-save-profile').onclick = () => {
            state.settings.userName = $('set-name').value || 'You';
            state.settings.userAvatar = $('set-avatar').value || 'U';
            $('profile-name').textContent = state.user ? (state.user.displayName || state.user.email.split('@')[0]) : state.settings.userName;
            $('profile-avatar').textContent = state.user ? '' : state.settings.userAvatar;
            if (!state.user && state.settings.userAvatar) {
                $('profile-avatar').textContent = state.settings.userAvatar;
            }
            $('profile-modal').classList.remove('active');
            saveLocal();
            if (state.activeId) renderChat();
        };

        function setupEvents() {
            $('input-form').onsubmit = e => { e.preventDefault(); send(); };
            $('user-input').onkeydown = e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
            $('user-input').oninput = autoResize;
            $('btn-stop').onclick = () => state.abort && state.abort.abort();
            $('btn-new').onclick = newChat;
            $('btn-toggle').onclick = () => $('sidebar').classList.toggle('collapsed');
            $('btn-theme').onclick = () => { state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark'; applyTheme(); saveLocal(); };
            
            $('btn-settings').onclick = () => {
                $('set-key').value = state.settings.apiKey;
                $('set-base').value = state.settings.baseUrl;
                $('set-model').value = state.settings.model;
                $('set-url').value = state.settings.apiUrl;
                $('set-prompt').value = state.settings.systemPrompt;
                $('settings-modal').classList.add('active');
            };
            $('btn-close-settings').onclick = () => $('settings-modal').classList.remove('active');
            $('settings-modal').onclick = e => { if(e.target === $('settings-modal')) $('settings-modal').classList.remove('active'); };
            
            $('btn-close-profile').onclick = () => $('profile-modal').classList.remove('active');
            $('profile-modal').onclick = e => { if(e.target === $('profile-modal')) $('profile-modal').classList.remove('active'); };
            
            ['set-key','set-base','set-model','set-url','set-prompt'].forEach(id => {
                $(id).onchange = () => {
                    state.settings.apiKey = $('set-key').value;
                    state.settings.baseUrl = $('set-base').value;
                    state.settings.model = $('set-model').value;
                    state.settings.apiUrl = $('set-url').value;
                    state.settings.systemPrompt = $('set-prompt').value;
                    saveLocal();
                };
            });

            $('btn-clear').onclick = () => {
                if(confirm('Delete ALL chats and settings?')) { localStorage.removeItem('spax_data'); location.reload(); }
            };
        }

        function newChat() { const id='c_'+Date.now(); state.chats[id]={id, title:'New Chat', messages:[], createdAt:Date.now()}; state.activeId=id; saveLocal(); renderSidebar(); renderChat(); $('user-input').focus(); }
        function switchChat(id) { if(state.isGen) return; state.activeId=id; saveLocal(); renderSidebar(); renderChat(); }
        function deleteChat(id, e) { e.stopPropagation(); if(!confirm('Delete?')) return; delete state.chats[id]; if(state.activeId===id) state.activeId=Object.keys(state.chats).pop()||null; saveLocal(); renderSidebar(); state.activeId ? renderChat() : renderWelcome(); }
        function renameChat(id, e) { e.stopPropagation(); const n=prompt('Rename:', state.chats[id].title); if(n) { state.chats[id].title=n.trim(); saveLocal(); renderSidebar(); } }
        function useSug(t) { $('user-input').value=t; send(); }
        function regen() { if(state.isGen) return; const c=state.chats[state.activeId]; if(!c) return; if(c.messages[c.messages.length-1].role==='assistant') c.messages.pop(); const last=c.messages.pop(); saveLocal(); renderChat(); $('user-input').value=last.content; send(); }
        function copyMsg(btn) { navigator.clipboard.writeText(btn.closest('.msg-content').querySelector('.msg-bubble').innerText); btn.innerHTML='Copied!'; setTimeout(()=>btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy', 2000); }
        function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        function scrollDown() { requestAnimationFrame(() => $('chat-area').scrollTop = $('chat-area').scrollHeight); }
        function autoResize() { const i=$('user-input'); i.style.height='auto'; i.style.height=Math.min(i.scrollHeight, 200)+'px'; }
        function toggleUI(isGen) { $('btn-send').style.display=isGen?'none':'flex'; $('btn-stop').classList.toggle('active', isGen); $('user-input').disabled=isGen; }
        function applyTheme() { document.documentElement.setAttribute('data-theme', state.settings.theme); }
        // Dummy function to prevent crashes since we removed highlight.js
function highlightCode(el) { 
    // Do nothing
}
     function renderMd(text) {
    if (!text) return '';
    
    // Code blocks (must be first to prevent inner formatting)
    text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
        return '<pre><code class="language-' + (lang || 'text') + '">' + escapeHtml(code.trim()) + '</code></pre>';
    });
    
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    // Headers (H1-H6)
    text = text.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
    text = text.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
    text = text.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
    text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
    text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
    text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');
    
    // Bold and italic
    text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    
    // Blockquotes
    text = text.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
    
    // Unordered lists
    text = text.replace(/^\* (.*$)/gim, '<li>$1</li>');
    text = text.replace(/^- (.*$)/gim, '<li>$1</li>');
    
    // Ordered lists
    text = text.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
    
    // Wrap consecutive <li> in <ul>
    text = text.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
        return '<ul>' + match + '</ul>';
    });
    
    // Horizontal rules
    text = text.replace(/^---$/gim, '<hr>');
    
    // Line breaks (convert newlines to <br> except inside pre/code blocks)
    text = text.replace(/\n/g, '<br>');
    
    // Clean up extra <br> after block elements
    text = text.replace(/<\/(h[1-6]|pre|blockquote|ul|hr)><br>/g, '</$1>');
    text = text.replace(/<br><(h[1-6]|pre|blockquote|ul|hr)/g, '<$1');
    
    return text;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
